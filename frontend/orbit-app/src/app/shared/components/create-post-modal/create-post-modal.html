<form [formGroup]="postForm" class="flex flex-col gap-2 h-full flex-1 min-h-[400px]">

  <textarea
    class="textarea w-full flex-1 text-xl resize-none bg-transparent focus:outline-none px-0"
    placeholder="¿Qué está pasando?"
    formControlName="content"
    (paste)="onPaste($event)"
  ></textarea>

  @if (imagePreviews().length > 0) {
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-2 mt-2">
      @for (preview of imagePreviews(); track $index) {
        <div class="relative group rounded-xl overflow-hidden border border-base-300 aspect-video">
          <img [src]="preview" class="w-full h-full object-cover" alt="Vista previa">
          <button
            type="button"
            class="absolute top-1 right-1 btn btn-xs btn-circle btn-error opacity-80 hover:opacity-100"
            (click)="removeImage($index)"
          >
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>
      }
    </div>
  }

  @if (errorMessage()) {
    <span class="text-error text-sm font-semibold mt-auto">{{ errorMessage() }}</span>
  }

  <div class="flex items-center justify-between mt-auto pt-2 border-t border-base-300">

    <div class="flex gap-2">
      <button
        type="button"
        class="btn btn-ghost btn-sm btn-circle text-secondary text-lg"
        (click)="fileInput.click()"
      >
        <i class="fa-regular fa-image"></i>
      </button>

      <input
        #fileInput
        type="file"
        multiple
        accept="image/png, image/jpeg, image/webp"
        class="hidden"
        (change)="onFilesSelected($event)"
      >
    </div>

    @if (isPosting()) {
      <div class="flex items-center gap-2 text-secondary text-sm">
        <span class="loading loading-spinner loading-xs"></span>
        Publicando...
      </div>
    }
  </div>
</form>
