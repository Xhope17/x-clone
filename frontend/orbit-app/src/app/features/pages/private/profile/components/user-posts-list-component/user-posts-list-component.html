<div class="flex flex-col px-2 sm:px-4 pt-4 bg-base-200/10 min-h-screen">
  @if (isLoading()) {
    <div class="p-12 flex justify-center">
      <span class="loading loading-spinner loading-lg text-teal-500"></span>
    </div>
  } @else {
    @for (item of posts(); track item.id) {
      <!-- [currentUserId]="authService.payload()?.profile_id ?? null" -->
      <!-- [currentUserId]="authService.userId() ?? null" -->
      <!-- <p>{{ authService.userId() ?? null }}</p> -->
      <app-post-card
        [post]="item"
        [currentUserId]="authService.payload()?.profile_id ?? null"
        (onDelete)="handleDeletePost($event)"
        (onLike)="handleLikePost($event)"
      ></app-post-card>
    } @empty {
      @if (isMyProfile()) {
        <h2 class="text-xl font-bold text-base-content mb-2 tracking-tight">
          Aún no has publicado nada
        </h2>
        <p class="text-sm text-base-content/60 max-w-xs mb-6">
          Realiza tu primera publicación y comparte tus ideas en Orbit.
        </p>
        <button
          class="btn btn-primary rounded-full px-8 text-white shadow-sm hover:scale-105 transition-transform"
        >
          Crear publicación
        </button>
      } @else {
        <h2 class="text-xl font-bold text-base-content mb-2 tracking-tight">Sin publicaciones</h2>
        <p class="text-sm text-base-content/60 max-w-xs mb-6">
          <span class="font-bold">@{{ userNameUrl() }}</span> aún no ha compartido nada. ¡Vuelve más
          tarde!
        </p>
      }
    }
  }
</div>
