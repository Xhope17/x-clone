<div class="flex flex-col">
  @if (isLoading()) {
    <div class="p-12 flex justify-center">
      <span class="loading loading-spinner loading-lg text-teal-500"></span>
    </div>
  } @else {

    <div class="flex flex-col">
      @for (item of posts(); track item.id) {
        <div class="bg-base-100 border-b border-base-content/10 last:border-b-0">
          <app-post-card
            [post]="item"
            [currentUserId]="authService.payload()?.profile_id ?? null"
            (onDelete)="handleDeletePost($event)"
            (onLike)="handleLikePost($event)"
            (onSave)="handleSavePost($event)"
            (onQuote)="handleQuotePost($event)"
            (onRepost)="handleRepostPost($event)"
            (onEdit)="handleEditPost($event)"
          ></app-post-card>
        </div>
      } @empty {

        <div class="flex flex-col items-center justify-center p-12 text-center bg-base-100">
          <div class="w-20 h-20 mb-6 rounded-full bg-base-200/50 flex items-center justify-center text-base-content/30 text-3xl">
            <i class="fa-solid fa-magnifying-glass-minus"></i>
          </div>
          <h2 class="text-xl font-bold text-base-content mb-2 tracking-tight">
            No encontramos publicaciones
          </h2>
          <p class="text-sm text-base-content/60 max-w-sm">
            No hay resultados para "<span class="font-bold text-base-content">{{ query() }}</span>".
            Intenta buscar con otras palabras o revisa la ortografía.
          </p>
        </div>

      }
    </div>

  }
</div>
