<div
  class="flex flex-col w-full min-h-screen pb-20 bg-base-100 border-x border-base-content/5 relative"
>
  <div
    class="sticky top-0 z-30 bg-base-100/80 backdrop-blur-lg border-b border-base-content/5 flex flex-col pt-2 shadow-sm"
  >
    <div class="flex items-center justify-between px-4 pb-2">
      <h1 class="text-xl font-black tracking-tight">Comunidades</h1>
      <button class="btn btn-sm btn-ghost btn-circle hover:bg-base-200" (click)="openCreateModal()">
        <i class="fa-solid fa-plus"></i>
      </button>
    </div>

    <div class="flex w-full px-4 relative">
      <button
        (click)="setTab('discover')"
        class="flex-1 pb-3 pt-2 text-[15px] font-bold relative transition-colors"
        [class.text-base-content]="activeTab() === 'discover'"
        [class.text-base-content/50]="activeTab() !== 'discover'"
      >
        Descubrir
        @if (activeTab() === 'discover') {
          <div
            class="absolute bottom-0 left-1/2 -translate-x-1/2 w-16 h-1 bg-teal-500 rounded-t-full"
          ></div>
        }
      </button>

      <button
        (click)="setTab('my-communities')"
        class="flex-1 pb-3 pt-2 text-[15px] font-bold relative transition-colors"
        [class.text-base-content]="activeTab() === 'my-communities'"
        [class.text-base-content/50]="activeTab() !== 'my-communities'"
      >
        Mis Comunidades
        @if (activeTab() === 'my-communities') {
          <div
            class="absolute bottom-0 left-1/2 -translate-x-1/2 w-24 h-1 bg-teal-500 rounded-t-full"
          ></div>
        }
      </button>
    </div>
  </div>

  <div class="flex flex-col p-4 bg-base-200/10 min-h-screen gap-3">
    @if (isLoading()) {
      <div class="p-12 flex justify-center">
        <span class="loading loading-spinner loading-lg text-teal-500"></span>
      </div>
    } @else {
      @if (activeTab() === 'discover') {
        <div class="relative mb-4">
          <i
            class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-base-content/40"
          ></i>
          <input
            type="text"
            placeholder="Buscar comunidades..."
            class="input input-bordered w-full pl-10 rounded-full bg-base-200/50 focus:bg-base-100 transition-colors border-none ring-1 ring-base-content/10 focus:ring-primary/50"
            (input)="onSearch($event)"
          />
        </div>
      }

      @for (community of communities(); track community.id) {
        <community-card-component
          [community]="community"
          (onJoinClick)="handleJoinCommunity($event)"
        ></community-card-component>
      } @empty {
        <div class="flex flex-col items-center justify-center p-10 text-center mt-6">
          <div
            class="w-16 h-16 mb-4 rounded-full bg-base-200/50 flex items-center justify-center text-base-content/40 text-2xl"
          >
            <i class="fa-solid fa-users"></i>
          </div>
          <h2 class="text-xl font-bold text-base-content mb-2 tracking-tight">
            {{
              activeTab() === 'discover'
                ? 'No se encontraron comunidades'
                : 'No te has unido a ninguna comunidad'
            }}
          </h2>
        </div>
      }
    }
  </div>
</div>
